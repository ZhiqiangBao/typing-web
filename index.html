<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>打字练习</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <main class="card">
    <nav class="topbar">
      <div class="tabs">
        <button class="tab active" data-view="practice">练习 Practice</button>
        <button class="tab" data-view="profile">档案 Profile</button>
      </div>
      <div class="theme-picker">
        <label for="themeSelect">主题</label>
        <select id="themeSelect" aria-label="选择主题">
          <option value="blue">浅蓝</option>
          <option value="dark">深色</option>
          <option value="beige">米黄</option>
          <option value="green">青绿</option>
        </select>
      </div>
    </nav>

    <!-- ============== Practice 视图 ============== -->
    <section id="view-practice" class="view active">
      <header class="head">
        <h1>打字练习</h1>
        <div class="doc-picker">
          <label for="docSelect">选择文章</label>
          <select id="docSelect" aria-label="选择文章"></select>
        </div>
      </header>

      <section class="stats">
        <div class="stat"><span id="statProg">0%</span><label>进度</label></div>
        <div class="stat"><span id="statAcc">100%</span><label>准确率</label></div>
        <div class="stat"><span id="statWpm">0</span><label>WPM</label></div>
        <div class="stat"><span id="statErr">0</span><label>错误</label></div>
      </section>

      <div id="passage" class="passage" aria-label="待输入文本"></div>

      <textarea id="input" class="typebox" rows="4"
        placeholder="在这里输入上面的文本…（一致显示黑色，不一致显示红色）"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>

      <div id="status" class="status"></div>

      <footer class="controls">
        <button id="newBtn" type="button">换一篇（随机）</button>
        <button id="resetBtn" type="button" class="ghost">重置</button>
        <span class="hint">未输入=灰色 · 正确=黑色 · 错误=红色</span>
      </footer>
    </section>

    <!-- ============== Profile 视图 ============== -->
    <section id="view-profile" class="view">
      <header class="head">
        <h1>训练档案</h1>
        <button id="clearHistoryBtn" type="button" class="ghost">清空历史</button>
      </header>

      <section class="stats">
        <div class="stat"><span id="totalCnt">0</span><label>总训练次数</label></div>
        <div class="stat"><span id="totalAcc">—</span><label>总正确率</label></div>
        <div class="stat"><span id="maxWpm">0</span><label>最高 WPM</label></div>
        <div class="stat"><span id="avgWpm">0</span><label>平均 WPM</label></div>
      </section>

      <section class="stats">
        <div class="stat"><span id="dayCnt">0</span><label>今日训练</label></div>
        <div class="stat"><span id="dayAcc">—</span><label>今日正确率</label></div>
        <div class="stat"><span id="dayMaxWpm">0</span><label>今日最高 WPM</label></div>
        <div class="stat"><span id="dayAvgWpm">0</span><label>今日平均 WPM</label></div>
      </section>

      <div class="charts">
        <div class="chart-box"><canvas id="wpmTrendChart"></canvas></div>
        <div class="chart-box"><canvas id="errChart"></canvas></div>
      </div>

      <div id="historyList" class="history-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
